name: Rollback (AgentOps)

# Manual rollback: redeploy a previous, known-good image tag. The tag is always
# available in the registry (images are never deleted on deploy).
on:
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Image tag (short SHA) of the last known-good build to redeploy"
        required: true
      environment:
        description: "Target environment"
        required: true
        default: dev
        type: choice
        options: [dev, test, prod]

env:
  REGISTRY: cr52fuduue6hkvi.azurecr.io
  IMAGE_NAME: benefits-concierge

jobs:
  rollback:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.environment }}
    permissions:
      id-token: write
      contents: read
    steps:
      - uses: actions/checkout@v4
      - name: Azure login (OIDC)
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      - name: Redeploy previous image
        run: |
          az ai foundry agent deploy \
            --project ${{ vars.FOUNDRY_PROJECT_DEV }} \
            --image ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}:${{ github.event.inputs.image_tag }}
