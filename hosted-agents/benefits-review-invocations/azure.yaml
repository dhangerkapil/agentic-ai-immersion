# yaml-language-server: $schema=https://raw.githubusercontent.com/Azure/azure-dev/main/schemas/v1.0/azure.yaml.json

requiredVersions:
    extensions:
        azure.ai.agents: '>=0.1.0-preview'
name: benefits-review-invocations
services:
    benefits-review-invocations:
        project: .
        host: azure.ai.agent
        language: python
        config:
            container:
                resources:
                    cpu: "0.5"
                    memory: 1Gi
            deployments:
                - model:
                    format: OpenAI
                    name: gpt-5.4-mini
                    version: "2025-04-14"
                  name: gpt-5.4-mini
                  sku:
                    capacity: 2425
                    name: GlobalStandard
infra:
    provider: bicep
