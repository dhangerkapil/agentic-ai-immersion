# yaml-language-server: $schema=https://raw.githubusercontent.com/microsoft/AgentSchema/refs/heads/main/schemas/v1.0/ContainerAgent.yaml

kind: hosted
name: benefits-review-invocations
description: |
    Structured employee-benefits review agent. Uses the Invocations protocol: a single structured request returns a structured benefits review (summary, strengths, gaps, benchmark positioning, recommendations). Ideal for batch and API-to-API integration.
metadata:
    tags:
        - Agent Framework
        - AI Agent Hosting
        - Invocations Protocol
        - Benefits Analysis
protocols:
    - protocol: invocations
      version: 1.0.0
resources:
    cpu: "0.5"
    memory: 1Gi
environment_variables:
    - name: AZURE_AI_MODEL_DEPLOYMENT_NAME
      value: gpt-4.1-mini
code_configuration:
    runtime: python_3_14
    entry_point: main.py
    dependency_resolution: remote_build
